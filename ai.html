<script id="fix-ai-ui">
const askBtn = document.getElementById("ask")
const input = document.getElementById("question")
const chat = document.getElementById("chat-messages")

const API_URL = "https://equaledge-ai.equaledge1ai.workers.dev"

function addMessage(text, type="ai"){
  const div = document.createElement("div")
  div.className = "message " + type
  div.textContent = text
  chat.appendChild(div)
  chat.scrollTop = chat.scrollHeight
}

async function askAI(question){

  addMessage(question,"user")

  const loading = document.createElement("div")
  loading.className = "message ai"
  loading.textContent = "Thinking..."
  chat.appendChild(loading)

  try{

    askBtn.disabled = true

    const res = await fetch(`${API_URL}?q=${encodeURIComponent(question)}`)
    const data = await res.json()

    loading.remove()

    if(!data.success){
      addMessage("AI failed. Try again.")
      return
    }

    // ✅ FIX: handle array properly
    const answerText = data.answer
      .map(a => "• " + a.point)
      .join("\n\n")

    addMessage(answerText)

    // ✅ FIX: correct sources
    if(data.sources && data.sources.length){
      const sourceBlock = document.createElement("div")
      sourceBlock.className = "message ai"

      let html = "<strong>Sources:</strong><ul>"

      data.sources.slice(0,3).forEach(s=>{
        html += `<li><a href="${s.url}" target="_blank">${s.url}</a></li>`
      })

      html += "</ul>"
      sourceBlock.innerHTML = html
      chat.appendChild(sourceBlock)
    }

  }catch(err){
    loading.remove()
    addMessage("Connection error. Check API.")
  }finally{
    askBtn.disabled = false
  }
}

askBtn.addEventListener("click",()=>{
  const q = input.value.trim()
  if(!q) return
  askAI(q)
  input.value = ""
})

input.addEventListener("keypress",(e)=>{
  if(e.key==="Enter") askBtn.click()
})

document.querySelectorAll(".suggestion").forEach(btn=>{
  btn.addEventListener("click",()=>{
    input.value = btn.textContent
    askBtn.click()
  })
})
});
});
</script>
