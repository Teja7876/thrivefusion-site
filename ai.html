<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EqualEdge AI Assistant</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family: system-ui, Arial;
  margin:0;
  padding:0;
  background:#f7f9fc;
}

.header{
  background:#0b3d91;
  color:white;
  padding:15px;
}

.nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.nav a{
  color:white;
  text-decoration:none;
  margin-left:15px;
}

.ai-page{
  max-width:900px;
  margin:30px auto;
  padding:20px;
}

.chat-container{
  border:1px solid #ddd;
  border-radius:8px;
  background:#fff;
  padding:20px;
  min-height:400px;
  overflow-y:auto;
}

.message{
  margin-bottom:18px;
  padding:12px 14px;
  border-radius:6px;
  max-width:80%;
  white-space:pre-wrap;
}

.user{
  background:#e9f1ff;
  margin-left:auto;
}

.ai{
  background:#f5f5f5;
}

.chat-input{
  margin-top:20px;
  display:flex;
  gap:10px;
}

.chat-input textarea{
  flex:1;
  padding:12px;
  border:1px solid #ccc;
  border-radius:6px;
  height:70px;
}

.chat-input button{
  padding:12px 20px;
  background:#0b3d91;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.chat-input button:disabled{
  opacity:.6;
}
</style>
</head>

<body>

<header class="header">
  <nav class="nav">
    <div><a href="index.html">ThriveFusion</a></div>
    <div>
      <a href="index.html">Home</a>
      <a href="blog.html">Blog</a>
    </div>
  </nav>
</header>

<main class="ai-page">
  <h1>EqualEdge AI Assistant</h1>
  <p>Ask about RPwD Act, inclusive education, accessibility, and disability rights.</p>

  <div id="chat" class="chat-container"></div>

  <div class="chat-input">
    <textarea id="question" placeholder="Ask your question..."></textarea>
    <button id="askBtn">Ask</button>
  </div>
</main>

<footer class="footer">
  <p style="text-align:center;">© 2026 ThriveFusion</p>
</footer>

<script>
const API_URL = "https://equaledge-ai.equaledge1ai.workers.dev/ask";

const chat = document.getElementById("chat");
const questionBox = document.getElementById("question");
const askBtn = document.getElementById("askBtn");

askBtn.onclick = askAI;

questionBox.addEventListener("keydown", e=>{
  if(e.key==="Enter" && !e.shiftKey){
    e.preventDefault();
    askAI();
  }
});

function addMessage(text, role){
  const msg = document.createElement("div");
  msg.className = "message " + role;
  msg.innerText = text;
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
  return msg;
}

async function askAI(){
  const q = questionBox.value.trim();

  if(!q){
    alert("Enter a question");
    return;
  }

  addMessage(q,"user");
  questionBox.value = "";

  const thinking = addMessage("Thinking...","ai");
  askBtn.disabled = true;

  try{
    const res = await fetch(API_URL + "?q=" + encodeURIComponent(q));
    const data = await res.json();

    thinking.innerText = data.answer || "No answer returned.";

  }catch(e){
    thinking.innerText = "Server connection failed";
  }

  askBtn.disabled = false;
}
</script>

</body>
</html>
