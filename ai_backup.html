<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EqualEdge AI Assistant</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:system-ui,Arial;margin:0;background:#f7f9fc;}
.header{background:#0b3d91;color:#fff;padding:15px;}
.nav{display:flex;justify-content:space-between;}
.nav a{color:#fff;text-decoration:none;margin-left:15px;}
.ai-page{max-width:900px;margin:30px auto;padding:20px;}
.chat-container{border:1px solid #ddd;border-radius:8px;background:#fff;padding:20px;min-height:400px;overflow-y:auto;}
.message{margin-bottom:15px;padding:10px;border-radius:6px;max-width:80%;white-space:pre-wrap;}
.user{background:#e9f1ff;margin-left:auto;}
.ai{background:#f1f1f1;}
.sources{font-size:12px;margin-top:6px;}
.chat-input{margin-top:20px;display:flex;gap:10px;}
textarea{flex:1;padding:10px;height:60px;}
button{padding:10px 20px;background:#0b3d91;color:#fff;border:none;cursor:pointer;}
</style>
</head>

<body>

<header class="header">
  <div class="nav">
    <div><a href="index.html">ThriveFusion</a></div>
    <div>
      <a href="index.html">Home</a>
      <a href="blog.html">Blog</a>
    </div>
  </div>
</header>

<main class="ai-page">

<h1>EqualEdge AI Assistant</h1>
<p>Ask about disability rights, RPwD Act, and inclusive education.</p>

<div id="chat" class="chat-container"></div>

<div class="chat-input">
  <textarea id="question" placeholder="Ask your question..."></textarea>
  <button id="askBtn">Ask</button>
</div>

</main>

<footer style="text-align:center;padding:20px;">
© 2026 ThriveFusion
</footer>

<script>

const API_URL = "https://equaledge-ai.equaledge1ai.workers.dev/search";

const chat = document.getElementById("chat");
const questionBox = document.getElementById("question");
const askBtn = document.getElementById("askBtn");

askBtn.onclick = askAI;

questionBox.addEventListener("keydown", (e)=>{
  if(e.key==="Enter" && !e.shiftKey){
    e.preventDefault();
    askAI();
  }
});

function addMessage(text, role){
  const msg = document.createElement("div");
  msg.className = "message " + role;
  msg.innerText = text;
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
  return msg;
}

function addSources(sources){
  if(!Array.isArray(sources) || sources.length===0) return;

  const div = document.createElement("div");
  div.className = "sources";

  div.innerHTML = "<b>Sources:</b><br>" +
    sources.map(s => {
      try{
        const url = new URL(s);
        return `<a href="${url.href}" target="_blank">${url.hostname}</a>`;
      }catch{
        return "";
      }
    }).join("<br>");

  chat.appendChild(div);
}

async function askAI(){

  const q = questionBox.value.trim();
  if(!q){
    alert("Enter a question");
    return;
  }

  addMessage(q,"user");
  questionBox.value="";

  const thinking = addMessage("Thinking...","ai");
  askBtn.disabled = true;

  try{

    const url = API_URL + "?q=" + encodeURIComponent(q) + "&t=" + Date.now();

    const res = await fetch(url, { cache: "no-store" });

    if(!res.ok){
      throw new Error("HTTP " + res.status);
    }

    const text = await res.text();

    let data;

    try{
      data = JSON.parse(text);
    }catch{
      thinking.innerText = "Invalid server response";
      console.error("RAW RESPONSE:", text);
      return;
    }

    console.log("API RESPONSE:", data);

    if(data && typeof data.answer === "string" && data.answer.trim() !== ""){
      thinking.innerText = data.answer;
      addSources(data.sources);
    }else{
      thinking.innerText = "No answer returned (API issue)";
    }

  }catch(e){
    thinking.innerText = "Error: " + e.message;
  }

  askBtn.disabled = false;
}

</script>

</body>
</html>
