<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ThriveFusion Blog | Disability Knowledge</title>

<meta name="description" content="Latest articles on disability rights, RPwD Act, accessibility and inclusive education.">

<style>

body{
font-family:system-ui,Segoe UI,Roboto,Arial;
max-width:900px;
margin:40px auto;
padding:0 20px;
line-height:1.6;
background:#fafafa;
color:#222;
}

h1{
margin-bottom:10px;
}

.post{
background:#fff;
padding:20px;
border-radius:8px;
border:1px solid #e6e6e6;
margin-bottom:15px;
text-decoration:none;
display:block;
color:#222;
}

.post:hover{
box-shadow:0 3px 10px rgba(0,0,0,.06);
}

.title{
font-size:20px;
font-weight:600;
color:#1a73e8;
}

.preview{
font-size:14px;
margin-top:6px;
color:#555;
}

</style>
</head>

<body>

<h1>ThriveFusion Blog</h1>

<p>
Latest articles about disability rights, accessibility,
inclusive education and assistive technology.
</p>

<div id="posts"></div>

<p id="loading">Loading articles...</p>

<script>

async function loadPosts(){

try{

const res = await fetch("/posts_all.json")

if(!res.ok) throw new Error("Dataset missing")

const posts = await res.json()

const container = document.getElementById("posts")

document.getElementById("loading").style.display="none"

posts.forEach(post => {

const title = (post.title?.rendered || post.title || "Untitled")
.replace(/<\/?[^>]+>/g,"")

const content = (post.content?.rendered || post.content || "")
.replace(/<\/?[^>]+>/g,"")

const card = document.createElement("a")

card.className="post"

card.href=`post.html?id=${post.id}`

card.innerHTML=`
<div class="title">${title}</div>
<div class="preview">${content.substring(0,160)}...</div>
`

container.appendChild(card)

})

}catch(e){

document.getElementById("loading").innerText="Failed to load articles."

}

}

loadPosts()

</script>

</body>
</html>
