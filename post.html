<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ThriveFusion Article</title>

<meta name="description" content="Accessible disability knowledge platform covering RPwD Act, accessibility, inclusive education and assistive technology.">

<style>

*{
box-sizing:border-box;
}

body{
font-family:system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial,sans-serif;
margin:40px auto;
padding:0 20px;
line-height:1.7;
background:#fafafa;
color:#222;
max-width:900px;
}

header{
margin-bottom:30px;
}

h1{
font-size:32px;
margin-bottom:20px;
}

nav{
margin-bottom:30px;
}

nav a{
text-decoration:none;
color:#0066cc;
font-weight:500;
}

nav a:hover{
text-decoration:underline;
}

article{
background:#ffffff;
padding:30px;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

article img{
max-width:100%;
height:auto;
margin:20px 0;
}

article p{
margin:16px 0;
}

article h2{
margin-top:30px;
}

.loading{
color:#777;
}

.error{
color:red;
margin-top:20px;
}

</style>

</head>

<body>

<header>

<nav>
<a href="index.html">← Back to articles</a>
</nav>

<h1 id="title" class="loading">Loading article...</h1>

</header>

<main>

<article id="content"></article>

<p id="error" class="error" hidden>Article not found.</p>

</main>

<script>

async function loadPost(){

const params=new URLSearchParams(window.location.search)

const id=params.get("id")

if(!id){
document.getElementById("title").innerText="Invalid article"
return
}

try{

const res=await fetch("posts_all.json")

const posts=await res.json()

const post=posts.find(p=>String(p.id)===String(id))

if(!post){

document.getElementById("title").innerText="Article not found"

document.getElementById("error").hidden=false

return

}

document.title=post.title+" | ThriveFusion"

document.getElementById("title").innerText=post.title

const formattedContent=post.content
.split("\n\n")
.map(p=>`<p>${p}</p>`)
.join("")

document.getElementById("content").innerHTML=formattedContent

}

catch(err){

document.getElementById("title").innerText="Failed to load article"

}

}

loadPost()

</script>

</body>

</html>
